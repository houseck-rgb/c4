<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>최우영고기야 소스리스트</title>

<link rel="icon" type="image/png" href="./icon-v11.png?v=11">
<link rel="shortcut icon" type="image/png" href="./icon-v11.png?v=11">

<link rel="apple-touch-icon"
      sizes="180x180"
      href="./icon-v11.png?v=11">

<link rel="manifest" href="./manifest.json?v=11">

<meta name="apple-mobile-web-app-title"
      content="최우영고기야">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<style>
body{
  font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}
.header{
text-align:center;
margin-bottom:20px;
}
.header h1{
color:#b8860b;
font-size:30px;
margin:0;
}
.header p{
color:#777;
margin-top:6px;
}
.card{
background:white;
border-radius:18px;
padding:18px;
margin-bottom:16px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}
.card h2{
margin:0 0 14px;
}
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}
.item:last-child{
border-bottom:none;
}
.name{
font-size:16px;
}
input{
width:70px;
height:36px;
border-radius:10px;
border:1px solid #ddd;
text-align:center;
font-size:16px;
}
.preview{
background:white;
border:2px solid #d4af37;
border-radius:18px;
padding:18px;
margin-bottom:20px;
}
.preview h3{
margin-top:0;
color:#b8860b;
}
.preview-item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #f1f1f1;
}
button{
width:100%;
height:56px;
border:none;
border-radius:18px;
background:black;
color:white;
font-size:18px;
font-weight:bold;
position:fixed;
bottom:20px;
left:0;
}
.wrap{
padding-bottom:100px;
}

/* 상단 고급 이동 버튼 */
.quick-links{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:0 0 18px;
}
.quick-link{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:58px;
  border-radius:20px;
  text-decoration:none;
  color:#fff7d7;
  font-weight:900;
  border:1px solid rgba(212,175,55,.45);
  background:
    radial-gradient(circle at 20% 0%, rgba(255,255,255,.22), transparent 28%),
    linear-gradient(135deg,#111,#2a1c07 45%,#111);
  box-shadow:0 8px 24px rgba(0,0,0,.16), inset 0 0 18px rgba(212,175,55,.08);
}
.quick-link::before{
  content:'';
  position:absolute;
  top:-40%;
  left:-80%;
  width:70%;
  height:180%;
  background:linear-gradient(90deg,transparent,rgba(255,235,170,.32),transparent);
  transform:rotate(18deg);
  animation:softShine 3.6s ease-in-out infinite;
}
.quick-link span{position:relative;z-index:1;}
.quick-link .ico{font-size:22px;filter:drop-shadow(0 0 7px rgba(212,175,55,.55));}
@keyframes softShine{
  0%{left:-90%;opacity:0}
  35%{opacity:1}
  70%{left:120%;opacity:0}
  100%{left:120%;opacity:0}
}
.order-actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:18px;
}
.order-btn{
  position:static;
  width:100%;
  height:50px;
  border:none;
  border-radius:16px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 5px 14px rgba(0,0,0,.12);
}
.order-btn.check{background:linear-gradient(135deg,#fff7dc,#d4af37,#9b6b08);color:#191300;}
.order-btn.clear{background:linear-gradient(135deg,#222,#000);color:#fff;}
button.copy-main{position:static;margin-top:6px;width:100%;}

</style>
</head>
<body>

<div class="wrap">

<div class="header">
<h1>🥩 최우영고기야</h1>
<p>소스리스트 ERP Lite</p>
</div>

<div class="quick-links">
  <a class="quick-link" href="https://c2-lac.vercel.app/">
    <span class="ico">🥬</span><span>야채 리스트</span>
  </a>
  <a class="quick-link" href="https://c3-lovat-five.vercel.app">
    <span class="ico">🥩</span><span>고기 리스트</span>
  </a>
</div>


<div class="card">
<h2>🍜 소스 리스트</h2>
<div class="item"><div class="name">설탕</div><input type="number" onchange="updatePreview()" data-name="설탕"></div>
<div class="item"><div class="name">꽃소금</div><input type="number" onchange="updatePreview()" data-name="꽃소금"></div>
<div class="item"><div class="name">미풍(미원)</div><input type="number" onchange="updatePreview()" data-name="미풍(미원)"></div>
<div class="item"><div class="name">진국다시(다시다)</div><input type="number" onchange="updatePreview()" data-name="진국다시(다시다)"></div>
<div class="item"><div class="name">식초</div><input type="number" onchange="updatePreview()" data-name="식초"></div>
<div class="item"><div class="name">미림</div><input type="number" onchange="updatePreview()" data-name="미림"></div>
<div class="item"><div class="name">쌀</div><input type="number" onchange="updatePreview()" data-name="쌀"></div>
<div class="item"><div class="name">메밀국수</div><input type="number" onchange="updatePreview()" data-name="메밀국수"></div>
<div class="item"><div class="name">까나리액젓</div><input type="number" onchange="updatePreview()" data-name="까나리액젓"></div>
<div class="item"><div class="name">물엿</div><input type="number" onchange="updatePreview()" data-name="물엿"></div>
<div class="item"><div class="name">고추기름</div><input type="number" onchange="updatePreview()" data-name="고추기름"></div>
<div class="item"><div class="name">참기름</div><input type="number" onchange="updatePreview()" data-name="참기름"></div>
<div class="item"><div class="name">된장</div><input type="number" onchange="updatePreview()" data-name="된장"></div>
<div class="item"><div class="name">간장</div><input type="number" onchange="updatePreview()" data-name="간장"></div>
<div class="item"><div class="name">쌈장</div><input type="number" onchange="updatePreview()" data-name="쌈장"></div>
<div class="item"><div class="name">후추가루</div><input type="number" onchange="updatePreview()" data-name="후추가루"></div>
<div class="item"><div class="name">식용유</div><input type="number" onchange="updatePreview()" data-name="식용유"></div>
<div class="item"><div class="name">주방세제</div><input type="number" onchange="updatePreview()" data-name="주방세제"></div>
<div class="item"><div class="name">오븐클리너</div><input type="number" onchange="updatePreview()" data-name="오븐클리너"></div>
<div class="item"><div class="name">가쓰오부시</div><input type="number" onchange="updatePreview()" data-name="가쓰오부시"></div>
<div class="item"><div class="name">디포리</div><input type="number" onchange="updatePreview()" data-name="디포리"></div>
<div class="item"><div class="name">김가루</div><input type="number" onchange="updatePreview()" data-name="김가루"></div>
<div class="item"><div class="name">참깨</div><input type="number" onchange="updatePreview()" data-name="참깨"></div>
<div class="item"><div class="name">통후추</div><input type="number" onchange="updatePreview()" data-name="통후추"></div>
<div class="item"><div class="name">다시마</div><input type="number" onchange="updatePreview()" data-name="다시마"></div>
<div class="item"><div class="name">치킨스톡</div><input type="number" onchange="updatePreview()" data-name="치킨스톡"></div>

<div class="item"><div class="name">고춧가루</div><input type="number" onchange="updatePreview()" data-name="고춧가루"></div>
<div class="item"><div class="name">양파분말</div><input type="number" onchange="updatePreview()" data-name="양파분말"></div>
<div class="item"><div class="name">빙초산</div><input type="number" onchange="updatePreview()" data-name="빙초산"></div>
<div class="item"><div class="name">혼다시</div><input type="number" onchange="updatePreview()" data-name="혼다시"></div>


</div>
</div>


<div class="preview" style="margin-top:24px;">
<h3>✅ 발주 품목리스트 확인</h3>
<div id="previewList">선택된 품목이 없습니다.</div>
</div>

<div class="order-actions" style="margin-top:14px;">
  <button class="copy-main" onclick="copyText()">📋 발주내용 복사</button>
  <button class="order-btn clear" onclick="clearOrderList()">🗑️ 발주 리스트 지우기</button>
</div>


<script>
function updatePreview(){
const inputs=document.querySelectorAll('input');
const preview=document.getElementById('previewList');

let html='';
let has=false;

inputs.forEach(input=>{
if(input.value && Number(input.value)>0){
has=true;
html+=`
<div class="preview-item">
<span>${input.dataset.name}</span>
<strong>${input.value}</strong>
</div>
`;
}
});

if(!has){
html='선택된 품목이 없습니다.';
}

preview.innerHTML=html;

}


function checkOrderList(){
const items=document.querySelectorAll('.preview-item');
if(items.length===0){
alert('확인할 발주 품목이 없습니다.');
return;
}
alert('발주 품목 '+items.length+'개가 선택되었습니다.');
}

function clearOrderList(){
if(!confirm('입력한 발주 수량을 모두 지울까요?')) return;
const inputs=document.querySelectorAll('input');
inputs.forEach(input=>input.value='');
updatePreview();
alert('발주 리스트를 지웠습니다.');
}

function copyText(){
const items=document.querySelectorAll('.preview-item');

if(items.length===0){
alert('복사할 발주 품목이 없습니다.');
return;
}

let text='🥩 최우영고기야 소스리스트\n\n';

items.forEach(item=>{
text+=item.innerText+'\n';
});

navigator.clipboard.writeText(text);
alert('복사 완료!');
}
</script>

</body>
</html>
